services:
  vibe:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${VIBE_E2E_PORT:-15123}:5123"
    environment:
      - AVIBE_HOME=/data/avibe
      - VIBE_DEPLOYMENT_ENV=e2e
      - VIBE_UI_PORT=5123
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5123/health', timeout=3)"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 10s
    # Default: UI server only (sufficient for most API tests)
    # Override with: command: ["full"] to also start the service process
    command: ["ui"]
